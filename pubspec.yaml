name: doogeun_ticket
description: "두근티켓 - 어르신을 위한 공연 티켓 자동 응모 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.5.1

  # 라우팅
  go_router: ^14.2.0

  # 네트워크
  dio: ^5.4.3

  # 저장소
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # 이미지
  cached_network_image: ^3.3.1

  # 한국어/날짜 포맷
  intl: ^0.19.0

  # 모델 직렬화
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Pretendard 폰트
  # 폰트 파일은 assets/fonts/ 에 추가해야 한다.
   - Pretendard-Regular.otf  (weight 400)
   - Pretendard-Medium.otf   (weight 500)
   - Pretendard-SemiBold.otf (weight 600)
   - Pretendard-Bold.otf     (weight 700)
  # 파일 추가 후 아래 주석을 해제하면 된다.
  #
  # fonts:
  #   - family: Pretendard
  #     fonts:
  #       - asset: assets/fonts/Pretendard-Regular.otf
  #         weight: 400
  #       - asset: assets/fonts/Pretendard-Medium.otf
  #         weight: 500
  #       - asset: assets/fonts/Pretendard-SemiBold.otf
  #         weight: 600
  #       - asset: assets/fonts/Pretendard-Bold.otf
  #         weight: 700
