name: doogeun_ticket
description: "도담 - 어르신을 위한 공연 티켓 자동 응모 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.5.1

  # 라우팅
  go_router: ^14.2.0

  # 네트워크
  dio: ^5.4.3

  # 저장소
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # 이미지
  cached_network_image: ^3.3.1

  # 스켈레톤(로딩) 효과
  shimmer: ^3.0.0

  # 결과 카드 슬라이드 인 애니메이션
  flutter_staggered_animations: ^1.1.1

  # 좌석 구역 카드 스와이프 (틴더 스타일)
  flutter_card_swiper: ^7.0.2

  # 한국어/날짜 포맷
  intl: ^0.20.2

  # 모델 직렬화
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # JWT 디코드 (서버에 /me 가 없어 토큰 클레임에서 user 정보 추출)
  jwt_decoder: ^2.0.1

  # 위치 (홈 거리 계산 / kakao-route 기준점)
  geolocator: ^13.0.1

  # 카카오맵 등 외부 지도 앱 열기
  url_launcher: ^6.3.0

  # 백엔드 네이버 지도 페이지(/map?id=...) 임베드용 WebView (Native 전용)
  webview_flutter: ^4.10.0

  # Flutter Web 에서 iframe 으로 같은 페이지 임베드
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Pretendard 폰트 — 파일은 assets/fonts/ 에 위치
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
